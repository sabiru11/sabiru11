<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bunga Buat Pacar</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:black;
      overflow:hidden;
      font-family:Arial, sans-serif;
    }

    .flower{
      position:relative;
      width:200px;
      height:200px;
      animation: float 3s ease-in-out infinite;
    }

    .petal{
      position:absolute;
      width:80px;
      height:80px;
      background:#ff4da6;
      border-radius:50%;
      box-shadow:0 0 20px #ff4da6;
    }

    .petal:nth-child(1){
      top:0;
      left:60px;
    }

    .petal:nth-child(2){
      top:60px;
      left:0;
    }

    .petal:nth-child(3){
      top:60px;
      right:0;
    }

    .petal:nth-child(4){
      bottom:0;
      left:60px;
    }

    .center{
      position:absolute;
      width:70px;
      height:70px;
      background:yellow;
      border-radius:50%;
      top:65px;
      left:65px;
      box-shadow:0 0 20px yellow;
    }

    .stem{
      position:absolute;
      width:12px;
      height:200px;
      background:#00cc66;
      top:180px;
      left:94px;
      border-radius:10px;
    }

    .leaf{
      position:absolute;
      width:60px;
      height:30px;
      background:#00cc66;
      border-radius:50px 0;
    }

    .leaf.left{
      top:260px;
      left:40px;
      transform:rotate(-30deg);
    }

    .leaf.right{
      top:320px;
      left:100px;
      transform:rotate(30deg);
    }

    h1{
      position:absolute;
      bottom:40px;
      color:white;
      text-shadow:0 0 10px pink;
      font-size:24px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow{
      from{
        text-shadow:0 0 10px pink;
      }
      to{
        text-shadow:0 0 25px hotpink;
      }
    }

    @keyframes float{
      0%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-10px);
      }
      100%{
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="flower">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="center"></div>
  </div>

  <div class="stem"></div>
  <div class="leaf left"></div>
  <div class="leaf right"></div>

  <h1>buat kamu 🌸</h1>

</body>
</html>
